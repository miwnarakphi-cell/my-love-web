<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>แฟนของฉัน ❤️</title>
<style>
  body {
    background-color: white;  
    text-align: center;        
    font-family: Arial, sans-serif;
  }
  h1 {
    font-size: 50px;           
    margin-top: 20px;
    color: black;
  }
  .collage {
    display: flex;
    justify-content: center;
    gap: 40px;                 /* เว้นระยะระหว่างรูป */
    margin-top: 30px;
  }
  .collage img {
    width: 400px;              /* ขนาดรูปใหญ่ขึ้นจากเดิม 250px */
    border: 2px solid black;
    transition: transform 0.3s;
  }
  .collage img:nth-child(1) {
    transform: rotate(-7deg);  
  }
  .collage img:nth-child(2) {
    transform: rotate(5deg);   
  }
  .collage img:hover {
    transform: rotate(0deg) scale(1.1); 
  }
</style>
</head>
<body>

<h1>แฟนของฉัน ❤️</h1>

<div class="collage">
  <img src="pic1.jpg" alt="แฟน1">
  <img src="pic2.jpg" alt="แฟน2">
</div>

</body>
</html>
