<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>แฟนของฉัน ❤️</title>
<style>
  body {
    background: linear-gradient(to bottom right, #ffcccc, #ffe6e6);
    margin: 0;
    padding: 0;
    font-family: Arial, sans-serif;
  }

  /* ข้อความอยู่ข้างบน */
  header {
    text-align: center;
    padding: 40px 0;
  }
  header h1 {
    font-size: 70px;
    color: #ff3366;
    text-shadow: 2px 2px 5px #ff99aa;
  }

  /* รูปอยู่กลางจอ */
  main {
    display: flex;
    justify-content: center;
    align-items: center;
    height: calc(100vh - 120px); /* เอาพื้นที่เต็มหน้าจอ ลบ header */
  }

  .collage {
    display: flex;
    gap: 40px;
  }
  .collage img {
    width: 400px;
    border: 2px solid black;
    box-shadow: 5px 5px 20px rgba(0,0,0,0.4);
    transition: transform 0.3s, box-shadow 0.3s;
  }
  .collage img:nth-child(1) {
    transform: rotate(-7deg);
  }
  .collage img:nth-child(2) {
    transform: rotate(5deg);
  }
  .collage img:hover {
    transform: rotate(0deg) scale(1.1);
    box-shadow: 10px 10px 30px rgba(0,0,0,0.5);
  }
</style>
</head>
<body>

<header>
  <h1>แฟนของฉัน ❤️</h1>
</header>

<main>
  <div class="collage">
    <img src="pic1.jpg" alt="แฟน1">
    <img src="pic2.jpg" alt="แฟน2">
  </div>
</main>

</body>
</html>
